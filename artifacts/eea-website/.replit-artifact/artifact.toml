kind = "web"
previewPath = "/"
title = "Environmental Express Argentina"
version = "1.0.0"
id = "artifacts/eea-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24136

[services.development]
run = "pnpm --filter @workspace/eea-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eea-website", "run", "build" ]
publicDir = "artifacts/eea-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24136"
BASE_PATH = "/"
